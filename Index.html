<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bublic - Trade Without Fear</title>
  <style>
    body {background:#0a0a0a; color:white; font-family:Arial; margin:0; padding-bottom:80px;}
    header {background:#111; padding:15px 20px; display:flex; justify-content:space-between; align-items:center;}
    .btn {background:#2563eb; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;}
    .btn-red {background:#dc2626;}
    .nav {display:flex; gap:10px; background:#1a1a1a; padding:10px; overflow-x:auto;}
    .nav button {background:#222; color:white; border:none; padding:10px 15px; border-radius:8px; white-space:nowrap; cursor:pointer;}
    .active {background:#2563eb !important;}
    .container {padding:20px;}
    .card {background:#111; border:1px solid #333; border-radius:15px; padding:20px; margin-bottom:20px; position:relative;}
    .premium {position:absolute; top:0; right:0; background:#f97316; color:black; padding:5px 15px; border-radius:0 15px 0 15px; font-weight:bold; font-size:12px;}
    .stars {color:#fbbf24;}
    .run-bar {background:#111; padding:15px; display:flex; gap:10px; position:fixed; bottom:0; width:100%; left:0; border-top:1px solid #333;}
    a {text-decoration:none;}
  </style>
</head>
<body>

<header>
  <h2>Bublic</h2>
  <div>
    <button class="btn">Log in</button>
    <button class="btn btn-red">Sign up</button>
  </div>
</header>

<div class="nav">
  <button>📊 Charts</button>
  <button class="active">🤖 Trading Bots</button>
  <button>📈 Analysis Tool</button>
  <button>🧮 Risk Calculator</button>
</div>

<div class="container">
  
  <div class="card">
    <span class="premium">PREMIUM</span>
    <h3>🤖 Alpha Version 2026 Edition</h3>
    <p class="stars">⭐</p>
    <p>Premium trading bot with cutting-edge 2026 algorithms.</p>
    <a href="https://dukedevis.netlify.app/" target="_blank">
      <button class="btn" style="width:100%;">LOAD PREMIUM BOT</button>
    </a>
  </div>

</div>

<div class="run-bar">
  <a href="https://dukedevis.netlify.app/" target="_blank">
    <button class="btn" style="background:#10b981;">▶ Run</button>
  </a>
  <div style="flex:1; text-align:center; padding-top:10px;">Bot is not running</div>
</div>

</body>
</html>
